# Railway/Nixpacks configuration for E-RECYCLO
# Provides system dependencies for OpenCV/YOLO

[phases.setup]
# 1. ADD THIS LINE: This tells Railway to actually install Python
nixPkgs = ["python311", "gcc"] 

# 2. Your existing system libraries for OpenCV/YOLO
aptPkgs = [
    "libgl1", 
    "libglib2.0-0", 
    "libsm6", 
    "libxext6", 
    "libxrender-dev", 
    "libgomp1", 
    "ffmpeg", 
    "libgthread-2.0-0", 
    "libfontconfig1", 
    "libice6"
]

[phases.install]
# 3. Use 'python -m pip' to be extra safe
cmds = ["python -m pip install --upgrade pip", "python -m pip install -r requirements.txt"]

[phases.build]
cmds = ["python manage.py collectstatic --noinput --settings=config.settings.production"]

[start]
cmd = "python manage.py migrate --noinput --settings=config.settings.production && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"