<!--
============================================================
  MAP PICKER MODAL  — ERecyclo
  Usage: include "components/map_picker_modal.html"
  Call initMapPicker({...}) after including to initialise.
  Libraries: Leaflet 1.9 (OpenStreetMap) + Nominatim (free)
============================================================
-->

<!-- LEAFLET CSS + JS (free, no API key needed) -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>


<!-- ═══════════════════════════════════════════════════════
     MODAL HTML
═══════════════════════════════════════════════════════════ -->
<div id="mapPickerModal"
     class="fixed inset-0 z-[9999] flex items-center justify-center p-4"
     style="display:none !important; background:rgba(0,0,0,0.65); backdrop-filter:blur(6px);">

  <div class="relative w-full max-w-2xl bg-white dark:bg-slate-900 rounded-2xl shadow-2xl flex flex-col"
       style="max-height:90vh; overflow:visible;">

    <!-- ── Header ── -->
    <div class="flex items-center justify-between px-6 py-4 border-b border-slate-100 dark:border-slate-800 shrink-0">
      <div class="flex items-center gap-3">
        <span class="material-symbols-outlined text-primary">map</span>
        <div>
          <h3 class="text-sm font-black text-slate-800 dark:text-white uppercase tracking-widest">Set Pickup Location</h3>
          <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Drag the pin or search for your area</p>
        </div>
      </div>
      <button type="button" onclick="closeMapPicker()"
              class="size-8 rounded-full bg-slate-100 dark:bg-slate-800 flex items-center justify-center text-slate-500 hover:bg-red-50 hover:text-red-500 transition-all">
        <span class="material-symbols-outlined text-base">close</span>
      </button>
    </div>

    <!-- ── Search bar ── -->
    <div class="px-6 py-3 border-b border-slate-100 dark:border-slate-800 shrink-0 relative">
      <div class="flex gap-2">
        <div class="relative flex-1">
          <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-base pointer-events-none">search</span>
          <input id="mapSearchInput" type="text"
                 placeholder="Search area, society, landmark, city…"
                 autocomplete="off"
                 class="w-full pl-9 pr-4 py-2.5 text-sm bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl text-slate-800 dark:text-white placeholder:text-slate-400 focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all">
        </div>
        <button type="button" onclick="mapSearchNow()"
                class="px-4 py-2 bg-primary text-white text-xs font-black rounded-xl hover:bg-primary/90 transition-all uppercase tracking-widest shrink-0">
          Search
        </button>
        <button type="button" onclick="mapUseGPS()"
                title="Use my current location"
                class="px-3 py-2 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 rounded-xl hover:bg-blue-50 hover:text-blue-600 transition-all shrink-0"
                id="mapGpsBtn">
          <span class="material-symbols-outlined text-base">my_location</span>
        </button>
      </div>

      <!-- Search results dropdown — positioned via JS as fixed to escape any overflow clip -->
      <div id="mapSearchResults"
           style="display:none; position:fixed; z-index:99999; background:#fff; border:1px solid #e2e8f0; border-radius:12px; box-shadow:0 8px 30px rgba(0,0,0,0.15); max-height:220px; overflow-y:auto; min-width:200px;">
      </div>
    </div>

    <!-- ── Map ── -->
    <div id="mapPickerContainer" class="flex-1 relative" style="min-height:340px;">
      <div id="mapPickerMap" style="height:100%; width:100%; min-height:340px;"></div>

      <!-- Crosshair hint overlay (fades after first drag) -->
      <div id="mapHint"
           class="absolute bottom-4 left-1/2 -translate-x-1/2 bg-black/70 text-white text-[10px] font-bold uppercase tracking-widest px-4 py-2 rounded-full pointer-events-none z-[500] transition-opacity duration-500">
        📍 Drag the pin to your exact location
      </div>
    </div>

    <!-- ── Selected address strip ── -->
    <div class="px-6 py-3 bg-slate-50 dark:bg-slate-900/60 border-t border-slate-100 dark:border-slate-800 shrink-0">
      <div class="flex items-start gap-2">
        <span class="material-symbols-outlined text-primary text-base mt-0.5 shrink-0">location_on</span>
        <p id="mapSelectedAddress"
           class="text-xs text-slate-600 dark:text-slate-300 font-medium leading-snug">
          Move the pin to set your location
        </p>
      </div>
      <div class="flex gap-4 mt-1">
        <span class="text-[10px] text-slate-400 font-mono">Lat: <span id="mapLatPreview">—</span></span>
        <span class="text-[10px] text-slate-400 font-mono">Lng: <span id="mapLngPreview">—</span></span>
      </div>
    </div>

    <!-- ── Footer ── -->
    <div class="flex items-center justify-between px-6 py-4 border-t border-slate-100 dark:border-slate-800 shrink-0">
      <button type="button" onclick="closeMapPicker()"
              class="px-5 py-2.5 text-xs font-black uppercase tracking-widest text-slate-500 hover:text-slate-800 transition-colors">
        Cancel
      </button>
      <button type="button" onclick="confirmMapLocation()"
              id="mapConfirmBtn"
              disabled
              class="px-6 py-2.5 bg-primary text-white text-xs font-black uppercase tracking-widest rounded-xl disabled:opacity-40 disabled:cursor-not-allowed hover:bg-primary/90 transition-all flex items-center gap-2">
        <span class="material-symbols-outlined text-base">check_circle</span>
        Confirm Location
      </button>
    </div>
  </div>
</div>


<!-- ═══════════════════════════════════════════════════════
     MAP PICKER JAVASCRIPT
═══════════════════════════════════════════════════════════ -->
<script>
(function() {
  // ── State ────────────────────────────────────────────────
  let _map       = null;
  let _marker    = null;
  let _config    = {};
  let _confirmed = { lat: null, lng: null, address: '' };
  let _searchTimer = null;
  // City context: set silently from GPS when map opens, biases all searches
  let _userCity     = null;   // "Pune"
  let _userDistrict = null;   // "Pune District"
  let _userState    = null;   // "Maharashtra"
  let _userViewport = null;   // Nominatim viewbox "lng1,lat1,lng2,lat2" (±0.4deg around user)

  // ── Public init ──────────────────────────────────────────
  window.initMapPicker = function(cfg) {
    _config = Object.assign({
      triggerBtn   : '#openMapBtn',
      latInput     : '#id_latitude',
      lngInput     : '#id_longitude',
      latDisplay   : null,
      lngDisplay   : null,
      addressField : null,
      defaultLat   : 20.5937,
      defaultLng   : 78.9629,
      zoom         : 13,
      label        : 'Set Location on Map',
    }, cfg);

    // Wire up trigger button
    const btn = document.querySelector(_config.triggerBtn);
    if (btn) btn.addEventListener('click', openMapPicker);
  };

  // ── Open ─────────────────────────────────────────────────
  window.openMapPicker = function() {
    const modal = document.getElementById('mapPickerModal');
    modal.style.display = 'flex';

    // Silently grab GPS in background to detect user city for search biasing.
    // Does NOT move the map or marker — purely for context.
    if (!_userCity && navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(function(pos) {
        _detectUserCity(pos.coords.latitude, pos.coords.longitude);
      }, function() { /* permission denied — search works without city context */ },
      { timeout: 6000, maximumAge: 300000 });
    }

    // Tiny delay so the modal is visible before Leaflet calculates sizes
    setTimeout(() => {
      if (!_map) _initLeaflet();
      else _map.invalidateSize();
    }, 80);
  };

  // ── Close ────────────────────────────────────────────────
  window.closeMapPicker = function() {
    document.getElementById('mapPickerModal').style.display = 'none';
    _closeSearchResults();
  };

  // ── Confirm ──────────────────────────────────────────────
  window.confirmMapLocation = function() {
    if (_confirmed.lat === null) return;

    const q = (sel) => sel ? document.querySelector(sel) : null;
    const lat6 = _confirmed.lat.toFixed(6);
    const lng6 = _confirmed.lng.toFixed(6);

    // Write to actual form inputs
    _setVal(q(_config.latInput), lat6);
    _setVal(q(_config.lngInput), lng6);

    // Write to display inputs (readonly)
    _setVal(q(_config.latDisplay), lat6);
    _setVal(q(_config.lngDisplay), lng6);

    // Optionally fill address textarea
    if (_config.addressField && _confirmed.address) {
      const af = q(_config.addressField);
      if (af && !af.value.trim()) af.value = _confirmed.address;
    }

    // Trigger change events so any existing listeners pick it up
    [_config.latInput, _config.lngInput, _config.latDisplay,
     _config.lngDisplay, _config.addressField].forEach(sel => {
      const el = q(sel);
      if (el) el.dispatchEvent(new Event('input', { bubbles: true }));
    });

    closeMapPicker();

    // Show toast if available
    if (typeof showToast === 'function') {
      showToast('📍 Location set successfully!', 'success');
    }
  };

  // ── GPS ──────────────────────────────────────────────────
  window.mapUseGPS = function() {
    const btn = document.getElementById('mapGpsBtn');
    btn.innerHTML = '<span class="material-symbols-outlined text-base animate-spin">refresh</span>';

    if (!navigator.geolocation) {
      _showToastFallback('Geolocation not supported by your browser.');
      btn.innerHTML = '<span class="material-symbols-outlined text-base">my_location</span>';
      return;
    }

    navigator.geolocation.getCurrentPosition(
      (pos) => {
        const lat = pos.coords.latitude;
        const lng = pos.coords.longitude;
        _flyTo(lat, lng, 16);
        btn.innerHTML = '<span class="material-symbols-outlined text-base">my_location</span>';
      },
      () => {
        _showToastFallback('Could not detect GPS. Please allow location access or search manually.');
        btn.innerHTML = '<span class="material-symbols-outlined text-base">my_location</span>';
      },
      { timeout: 8000 }
    );
  };

  // ── Search ───────────────────────────────────────────────
  window.mapSearchNow = function() {
    const q = document.getElementById('mapSearchInput').value.trim();
    if (!q) return;
    _nominatimSearch(q);
  };

  // Live search on keyup with debounce.
  // Wire up directly — DOMContentLoaded has already fired by the time
  // an include-d template script runs, so we attach immediately.
  function _wireSearchInput() {
    const inp = document.getElementById('mapSearchInput');
    if (!inp) return;
    inp.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); mapSearchNow(); }
    });
    inp.addEventListener('input', () => {
      clearTimeout(_searchTimer);
      const v = inp.value.trim();
      if (v.length < 3) { _closeSearchResults(); return; }
      _searchTimer = setTimeout(() => _nominatimSearch(v), 450);
    });
  }
  // Run immediately (modal HTML is already in DOM when this script executes)
  _wireSearchInput();

  // ── Internal: init Leaflet ────────────────────────────────
  function _initLeaflet() {
    // Pre-fill from existing values if any
    const existLat = parseFloat(document.querySelector(_config.latInput)?.value) || _config.defaultLat;
    const existLng = parseFloat(document.querySelector(_config.lngInput)?.value) || _config.defaultLng;

    _map = L.map('mapPickerMap', { zoomControl: true, scrollWheelZoom: true })
             .setView([existLat, existLng], _config.zoom);

    // OpenStreetMap tile layer (modern light/glassy theme)
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      maxZoom: 20,
      subdomains: 'abcd',
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> | <a href="https://carto.com/attributions">CARTO</a>',
    }).addTo(_map);

    // Custom green marker icon
    const icon = L.divIcon({
      className: '',
      html: `<div style="
        width:32px; height:44px; position:relative; cursor:grab;
        filter: drop-shadow(0 3px 6px rgba(0,0,0,0.35));
      ">
        <svg viewBox="0 0 32 44" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M16 0C7.163 0 0 7.163 0 16c0 10 16 28 16 28S32 26 32 16C32 7.163 24.837 0 16 0z"
                fill="#17cf17"/>
          <circle cx="16" cy="16" r="7" fill="white"/>
        </svg>
      </div>`,
      iconSize: [32, 44],
      iconAnchor: [16, 44],
      popupAnchor: [0, -44],
    });

    _marker = L.marker([existLat, existLng], { icon, draggable: true }).addTo(_map);

    // If existing coords, confirm them immediately
    if (document.querySelector(_config.latInput)?.value) {
      _setConfirmed(existLat, existLng);
      _reverseGeocode(existLat, existLng);
    }

    // Events
    _marker.on('dragstart', () => {
      document.getElementById('mapHint').style.opacity = '0';
    });

    _marker.on('dragend', (e) => {
      const { lat, lng } = e.target.getLatLng();
      _setConfirmed(lat, lng);
      _reverseGeocode(lat, lng);
    });

    _map.on('click', (e) => {
      const { lat, lng } = e.latlng;
      _marker.setLatLng([lat, lng]);
      _setConfirmed(lat, lng);
      _reverseGeocode(lat, lng);
      document.getElementById('mapHint').style.opacity = '0';
    });
  }

  // ── Detect user city from GPS coords (silent, background) ───
  function _detectUserCity(lat, lng) {
    fetch('https://nominatim.openstreetmap.org/reverse?lat=' + lat + '&lon=' + lng + '&format=json&accept-language=en&zoom=10')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var a = data.address || {};
        _userCity     = a.city || a.town || a.village || a.county || null;
        _userDistrict = a.state_district || a.county || null;
        _userState    = a.state || null;
        // Build a ±0.5deg viewport box around user for Nominatim viewbox param
        var d = 0.5;
        _userViewport = (lng - d) + ',' + (lat + d) + ',' + (lng + d) + ',' + (lat - d);
      })
      .catch(function() { /* silent fail */ });
  }

  // ── Low-level Nominatim fetch ─────────────────────────────
  function _nominatimFetch(query, extraParams) {
    var url = 'https://nominatim.openstreetmap.org/search?q=' + encodeURIComponent(query)
            + '&format=json&limit=8&accept-language=en&countrycodes=in&dedupe=1'
            + (extraParams || '');
    return fetch(url).then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    });
  }

  // ── Main search: city-first 4-tier chain ──────────────────
  function _nominatimSearch(query) {
    var box = document.getElementById('mapSearchResults');
    var inp = document.getElementById('mapSearchInput');

    var rect = inp.getBoundingClientRect();
    box.style.top   = (rect.bottom + 4) + 'px';
    box.style.left  = rect.left + 'px';
    box.style.width = rect.width + 'px';
    box.innerHTML = '<div style="padding:12px 16px;font-size:11px;color:#94a3b8;">🔍 Searching…</div>';
    box.style.display = 'block';

    var q = query.trim();

    // Build city suffix from detected context (e.g. "Koregaon Park, Pune, Maharashtra")
    var cityCtx = _userCity
      ? (q + ', ' + _userCity + (_userState ? ', ' + _userState : ''))
      : null;

    // Viewbox param — tightly constrains results to ~55km box around user
    var vb = _userViewport ? ('&viewbox=' + _userViewport + '&bounded=0') : '';

    // Tier 1: query + city context + viewport bias (most targeted)
    var t1 = cityCtx ? _nominatimFetch(cityCtx, vb) : Promise.resolve([]);

    t1.then(function(r1) {
      if (r1 && r1.length >= 2) return r1;

      // Tier 2: query + viewport bias only (no city name — catches streets/areas)
      return _nominatimFetch(q + (_userState ? ', ' + _userState : ''), vb)
        .then(function(r2) {
          if (r2 && r2.length >= 2) return r2;

          // Tier 3: plain query + India (no viewport restriction)
          var q3 = q.toLowerCase().indexOf('india') === -1 ? q + ', India' : q;
          return _nominatimFetch(q3).then(function(r3) {
            if (r3 && r3.length >= 1) return r3;

            // Tier 4: drop last word, broader settlement search
            var words = q.split(' ');
            if (words.length > 1) {
              return _nominatimFetch(words.slice(0, -1).join(' ') + ', India');
            }
            return r3;
          });
        });
    })
    .then(function(results) {
      _renderSearchResults(results, box);
    })
    .catch(function(err) {
      console.error('Nominatim error:', err);
      box.innerHTML = '<div style="padding:12px 16px;font-size:11px;color:#ef4444;">Search failed. Check your connection.</div>';
    });
  }

  // ── Render results ────────────────────────────────────────
  function _renderSearchResults(results, box) {
    box.innerHTML = '';
    if (!results || !results.length) {
      var hint = _userCity ? ('in ' + _userCity + ' or nearby') : 'in India';
      box.innerHTML = '<div style="padding:12px 16px;font-size:11px;color:#94a3b8;">No results found ' + hint + '. Try a landmark, PIN code, or city name.</div>';
      return;
    }

    var typeIcons = {
      'residential':'🏘️','suburb':'🏘️','neighbourhood':'🏘️','quarter':'🏘️',
      'city':'🏙️','town':'🏙️','village':'🏡','hamlet':'🏡',
      'administrative':'📍','county':'📍','state':'📍','state_district':'📍',
      'road':'🛣️','highway':'🛣️','motorway':'🛣️','trunk':'🛣️',
      'amenity':'🏢','building':'🏢','commercial':'🏢',
      'postcode':'📮','place':'📍',
    };

    results.forEach(function(item) {
      var parts = item.display_name.split(',').map(function(s){ return s.trim(); });

      // Smart label: show name + nearest meaningful parent (skip country/state clutter)
      var skipWords = ['India','Maharashtra','Karnataka','Tamil Nadu','Gujarat','Rajasthan',
                       'Uttar Pradesh','Delhi','West Bengal','Telangana','Andhra Pradesh',
                       'Kerala','Madhya Pradesh','Bihar','Odisha','Punjab','Haryana'];
      var meaningful = parts.filter(function(p) { return skipWords.indexOf(p) === -1 && p.length > 1; });
      var primary   = meaningful.slice(0, 2).join(', ');
      var secondary = meaningful.slice(2, 5).join(', ');

      var icon = typeIcons[item.type] || typeIcons[item.class] || '📍';

      var row = document.createElement('div');
      row.style.cssText = 'padding:10px 16px;cursor:pointer;border-bottom:1px solid #f1f5f9;display:flex;align-items:flex-start;gap:10px;';
      row.innerHTML =
        '<span style="font-size:15px;margin-top:2px;flex-shrink:0;">' + icon + '</span>' +
        '<div style="min-width:0;flex:1;">' +
          '<div style="font-size:12px;font-weight:700;color:#1e293b;line-height:1.4;">' + primary + '</div>' +
          '<div style="font-size:10px;color:#94a3b8;margin-top:2px;">' + secondary + '</div>' +
        '</div>';
      row.addEventListener('mouseover', function(){ this.style.background = '#f0fdf4'; });
      row.addEventListener('mouseout',  function(){ this.style.background = ''; });
      row.addEventListener('click', function() {
        _flyTo(parseFloat(item.lat), parseFloat(item.lon), 17);
        document.getElementById('mapSearchInput').value = primary;
        _closeSearchResults();
      });
      box.appendChild(row);
    });
  }

  // ── Internal: reverse geocode ─────────────────────────────
  function _reverseGeocode(lat, lng) {
    var url = 'https://nominatim.openstreetmap.org/reverse?lat=' + lat + '&lon=' + lng + '&format=json&accept-language=en';
    fetch(url)
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var addr = data.display_name || (lat.toFixed(5) + ', ' + lng.toFixed(5));
        _confirmed.address = addr;
        document.getElementById('mapSelectedAddress').textContent = addr;
        // Keep city context in sync when user drags marker to a different city
        var a = data.address || {};
        if (a.city || a.town || a.village) {
          _userCity     = a.city || a.town || a.village || _userCity;
          _userDistrict = a.state_district || a.county || _userDistrict;
          _userState    = a.state || _userState;
          var d = 0.5;
          _userViewport = (lng - d) + ',' + (lat + d) + ',' + (lng + d) + ',' + (lat - d);
        }
      })
      .catch(function() {
        document.getElementById('mapSelectedAddress').textContent = lat.toFixed(5) + ', ' + lng.toFixed(5);
      });
  }

  // ── Internal: fly to ─────────────────────────────────────
  function _flyTo(lat, lng, zoom) {
    _map.flyTo([lat, lng], zoom, { animate: true, duration: 0.8 });
    _marker.setLatLng([lat, lng]);
    _setConfirmed(lat, lng);
    _reverseGeocode(lat, lng);
  }

  // ── Internal: set confirmed state ────────────────────────
  function _setConfirmed(lat, lng) {
    _confirmed.lat = lat;
    _confirmed.lng = lng;
    document.getElementById('mapLatPreview').textContent = lat.toFixed(6);
    document.getElementById('mapLngPreview').textContent = lng.toFixed(6);
    document.getElementById('mapConfirmBtn').disabled = false;
  }

  // ── Internal: helpers ─────────────────────────────────────
  function _setVal(el, val) { if (el) el.value = val; }

  function _closeSearchResults() {
    const box = document.getElementById('mapSearchResults');
    if (box) box.style.display = 'none';
  }

  function _showToastFallback(msg) {
    if (typeof showToast === 'function') showToast(msg, 'error');
    else alert(msg);
  }

  // Close modal on backdrop click
  document.addEventListener('click', (e) => {
    const modal = document.getElementById('mapPickerModal');
    if (e.target === modal) closeMapPicker();
  });

  // Close search dropdown on outside click
  document.addEventListener('click', (e) => {
    const box = document.getElementById('mapSearchResults');
    if (box && !e.target.closest('#mapSearchResults') && !e.target.closest('#mapSearchInput') && e.target.id !== 'mapSearchInput') {
      _closeSearchResults();
    }
  });
})();
</script>
