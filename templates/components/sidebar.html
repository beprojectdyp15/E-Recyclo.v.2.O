<!-- Sidebar Component -->
<aside class="w-64 bg-white border-r border-gray-200 overflow-y-auto">
    <div class="p-6">
        <!-- Logo -->
        <a href="{% url 'home' %}" class="flex items-center space-x-2">
            <span class="text-2xl">🌿</span>
            <span class="text-xl font-bold text-nature-500">E-RECYCLO</span>
        </a>
    </div>
    
    <!-- Navigation -->
    <nav class="px-4 space-y-1">
        {% if user.is_client %}
            <!-- Client Menu -->
            <a href="{% url 'client:dashboard' %}" class="flex items-center px-4 py-3 text-gray-700 rounded-lg hover:bg-nature-50 hover:text-nature-600 {% if request.resolver_match.url_name == 'dashboard' and request.resolver_match.namespace == 'client' %}bg-nature-50 text-nature-600{% endif %}">
                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
                </svg>
                Dashboard
            </a>
            
            <a href="{% url 'client:upload_ewaste' %}" class="flex items-center px-4 py-3 text-gray-700 rounded-lg hover:bg-nature-50 hover:text-nature-600">
                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>

                Upload E-Waste

            <a href="{% url 'client:my_uploads' %}" class="flex items-center px-4 py-3 text-gray-700 rounded-lg hover:bg-nature-50 hover:text-nature-600">
                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                </svg>
                My Uploads
            </a>
            
            <a href="{% url 'client:wallet' %}" class="flex items-center px-4 py-3 text-gray-700 rounded-lg hover:bg-nature-50 hover:text-nature-600">
                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"></path>
                </svg>
                Wallet
            </a>
            
            <a href="{% url 'client:collection_centers' %}" class="flex items-center px-4 py-3 text-gray-700 rounded-lg hover:bg-nature-50 hover:text-nature-600">
                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path>
                </svg>
                Collection Centers
            </a>
        
        {% elif user.is_vendor %}
            <!-- Vendor Menu -->
            <a href="{% url 'vendor:dashboard' %}" class="flex items-center px-4 py-3 text-gray-700 rounded-lg hover:bg-nature-50 hover:text-nature-600">
                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
                </svg>
                Dashboard
            </a>
            
            <a href="{% url 'vendor:pending_requests' %}" class="flex items-center px-4 py-3 text-gray-700 rounded-lg hover:bg-nature-50 hover:text-nature-600">
                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path>

                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path>
                </svg>
                Accepted Items
            </a>
            
            <a href="{% url 'vendor:reports' %}" class="flex items-center px-4 py-3 text-gray-700 rounded-lg hover:bg-nature-50 hover:text-nature-600">
                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path>
                </svg>

            </a>
        
        {% elif user.is_collector %}
            <!-- Collector Menu -->
            <a href="{% url 'collector:dashboard' %}" class="flex items-center px-4 py-3 text-gray-700 rounded-lg hover:bg-nature-50 hover:text-nature-600">
                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>

            <a href="{% url 'collector:available_pickups' %}" class="flex items-center px-4 py-3 text-gray-700 rounded-lg hover:bg-nature-50 hover:text-nature-600">
                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path>

            <a href="{% url 'collector:my_pickups' %}" class="flex items-center px-4 py-3 text-gray-700 rounded-lg hover:bg-nature-50 hover:text-nature-600">
                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">

                </svg>

            </a>
            
            <a href="{% url 'collector:earnings' %}" class="flex items-center px-4 py-3 text-gray-700 rounded-lg hover:bg-nature-50 hover:text-nature-600">
                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
                Earnings
            </a>
        {% endif %}
        
        <!-- Common Links -->
        <div class="pt-4 mt-4 border-t border-gray-200">
            <a href="{% url 'accounts:profile' %}" class="flex items-center px-4 py-3 text-gray-700 rounded-lg hover:bg-nature-50 hover:text-nature-600">
                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>

            <a href="{% url 'accounts:logout' %}" class="flex items-center px-4 py-3 text-red-600 rounded-lg hover:bg-red-50">
                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
