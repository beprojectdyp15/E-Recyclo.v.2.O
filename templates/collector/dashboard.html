{% extends 'base.html' %}

{% block page_content %}
<div class="space-y-6">
    <!-- Stats -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="bg-white rounded-lg shadow p-6">
            <h3 class="text-sm text-gray-500 mb-2">Available Pickups</h3>
            <p class="text-3xl font-bold text-blue-600">{{ available_pickups }}</p>
        </div>
        <div class="bg-white rounded-lg shadow p-6">
            <h3 class="text-sm text-gray-500 mb-2">My Active Pickups</h3>
            <p class="text-3xl font-bold text-orange-600">{{ my_active_pickups }}</p>
        </div>
        <div class="bg-white rounded-lg shadow p-6">
            <h3 class="text-sm text-gray-500 mb-2">Total Earnings</h3>
            <p class="text-3xl font-bold text-nature-600">₹{{ earnings.total_earned }}</p>
        </div>
    </div>
    
    <!-- Quick Actions -->
    <div class="bg-white rounded-lg shadow p-6">
        <h2 class="text-lg font-semibold mb-4">Quick Actions</h2>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <a href="{% url 'collector:available_pickups' %}" class="flex flex-col items-center p-4 border-2 border-nature-500 rounded-lg hover:bg-nature-50">
                <svg class="w-8 h-8 text-nature-500 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path>
                </svg>
                <span class="text-sm font-medium">Find Pickups</span>
            </a>
            <a href="{% url 'collector:my_pickups' %}" class="flex flex-col items-center p-4 border-2 border-gray-200 rounded-lg hover:bg-gray-50">
                <svg class="w-8 h-8 text-gray-600 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4"></path>
                </svg>
                <span class="text-sm font-medium">My Pickups</span>
            </a>
            <a href="{% url 'collector:earnings' %}" class="flex flex-col items-center p-4 border-2 border-gray-200 rounded-lg hover:bg-gray-50">
                <svg class="w-8 h-8 text-gray-600 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
                <span class="text-sm font-medium">Earnings</span>
            </a>
            <a href="{% url 'accounts:complete_collector_profile' %}" class="flex flex-col items-center p-4 border-2 border-gray-200 rounded-lg hover:bg-gray-50">
                <svg class="w-8 h-8 text-gray-600 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                </svg>
                <span class="text-sm font-medium">Profile</span>
            </a>
        </div>
    </div>
</div>
{% endblock %}
