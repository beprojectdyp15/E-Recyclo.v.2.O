{% extends 'base.html' %}

{% block page_content %}
<div class="max-w-4xl mx-auto">
    <div class="bg-white rounded-lg shadow p-6">
        <h2 class="text-2xl font-bold text-gray-900 mb-6">My Profile</h2>
        
        <div class="space-y-6">
            <!-- Basic Info -->
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-sm font-medium text-gray-500">Full Name</label>
                    <p class="text-lg text-gray-900">{{ user.get_full_name }}</p>
                </div>
                <div>
                    <label class="text-sm font-medium text-gray-500">Email</label>
                    <p class="text-lg text-gray-900">{{ user.email }}</p>
                </div>
                <div>
                    <label class="text-sm font-medium text-gray-500">Phone</label>
                    <p class="text-lg text-gray-900">{{ user.phone_number }}</p>
                </div>
                <div>
                    <label class="text-sm font-medium text-gray-500">Role</label>
                    <p class="text-lg text-gray-900">{{ user.get_role }}</p>
                </div>
            </div>
            
            <div class="pt-4 border-t">
                <a href="{% url 'accounts:edit_profile' %}" class="bg-nature-500 text-white px-6 py-2 rounded-lg hover:bg-nature-600">
                    Edit Profile
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
