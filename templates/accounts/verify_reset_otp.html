{% extends 'base_guest.html' %}
{% block title %}Verify OTP - E-RECYCLO{% endblock %}

{% block page_content %}
<div class="min-h-screen flex items-center justify-center px-4 py-12">
    <div class="max-w-md w-full space-y-8">
        <div class="text-center">
            <h2 class="text-3xl font-bold text-slate-900 dark:text-white">Verify OTP</h2>
            <p class="mt-2 text-slate-600 dark:text-slate-400">Enter the 6-digit OTP sent to {{ email }}</p>
        </div>
        
        <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-xl p-8">
            <form method="POST" class="space-y-6">
                {% csrf_token %}
                
                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Enter OTP</label>
                    <input type="text" name="otp" required maxlength="6" pattern="[0-9]{6}"
                           class="w-full px-4 py-4 border border-slate-300 dark:border-slate-600 rounded-xl bg-white dark:bg-slate-900 text-slate-900 dark:text-white text-center text-2xl tracking-widest font-mono focus:ring-2 focus:ring-primary focus:border-transparent"
                           placeholder="000000">
                </div>
                
                <button type="submit"
                        class="w-full bg-primary hover:bg-forest text-white py-3 rounded-xl font-semibold transition-colors">
                    Verify OTP
                </button>
            </form>
            
            <div class="mt-6 text-center">
                <a href="{% url 'accounts:forgot_password' %}" class="text-sm text-slate-500 hover:text-slate-700">
                    Didn't receive OTP? Request again
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
