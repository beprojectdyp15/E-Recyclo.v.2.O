{% extends 'base_guest.html' %}
{% load static %}
{% block title %}Forgot Password - E-RECYCLO{% endblock %}

{% block page_content %}
<div class="min-h-screen flex items-center justify-center px-4 py-12">
    <div class="max-w-md w-full space-y-8">
        <div class="text-center">
            <h2 class="text-3xl font-bold text-slate-900 dark:text-white">Forgot Password</h2>
            <p class="mt-2 text-slate-600 dark:text-slate-400">Enter your email to receive a reset OTP</p>
        </div>
        
        <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-xl p-8">
            <form method="POST" class="space-y-6">
                {% csrf_token %}
                
                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Email Address</label>
                    <input type="email" name="email" required
                           class="w-full px-4 py-3 border border-slate-300 dark:border-slate-600 rounded-xl bg-white dark:bg-slate-900 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary focus:border-transparent"
                           placeholder="your@email.com">
                </div>
                
                <button type="submit"
                        class="w-full bg-primary hover:bg-forest text-white py-3 rounded-xl font-semibold transition-colors">
                    Send Reset OTP
                </button>
            </form>
            
            <div class="mt-6 text-center">
                <a href="{% url 'accounts:login' %}" class="text-sm text-primary hover:text-forest">
                    ← Back to Login
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
