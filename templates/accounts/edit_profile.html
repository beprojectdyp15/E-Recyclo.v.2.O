{% extends 'base.html' %}

{% block page_content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-lg shadow p-6">
        <h2 class="text-2xl font-bold text-gray-900 mb-6">Edit Profile</h2>
        
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            
            <div class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">First Name</label>
                        <input type="text" name="first_name" value="{{ user.first_name }}" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-nature-500" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Last Name</label>
                        <input type="text" name="last_name" value="{{ user.last_name }}" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-nature-500" required>
                    </div>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Phone Number</label>
                    <input type="text" name="phone_number" value="{{ user.phone_number }}" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-nature-500" required>
                </div>
                
                <div class="flex gap-4 pt-4">
                    <button type="submit" class="bg-nature-500 text-white px-6 py-2 rounded-lg hover:bg-nature-600">
                        Save Changes
                    </button>
                    <a href="{% url 'accounts:profile' %}" class="bg-gray-200 text-gray-700 px-6 py-2 rounded-lg hover:bg-gray-300">
                        Cancel
                    </a>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
